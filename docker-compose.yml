services:
  backend:
    build:
      context: ./backend/PromptCraft.Api
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Default=Data Source=/data/promptcraft.db
      - AI__DefaultModel=${AI_DEFAULT_MODEL:-deepseek-chat}
      - AI__DeepSeekApiKey=${DEEPSEEK_API_KEY}
      - AI__QwenApiKey=${QWEN_API_KEY}
      - AI__OpenAIApiKey=${OPENAI_API_KEY}
    volumes:
      - backend-data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
